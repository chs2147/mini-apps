<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Apps — 작고 재미있는 앱들의 세계</title>
<meta name="description" content="MBTI 테스트, 테트리스, 포모도로 타이머, 카드 게임, 네온사인 메이커, QR코드 생성기 등 순수 HTML/CSS/JS로 만든 미니 앱 모음.">
<meta name="theme-color" content="#0d0d1a">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">

<meta property="og:type" content="website">
<meta property="og:url" content="https://chs2147.github.io/mini-apps/">
<meta property="og:title" content="Mini Apps — 작고 재미있는 앱들의 세계">
<meta property="og:description" content="MBTI 테스트, 테트리스, 포모도로 타이머, 카드 게임, 네온사인 메이커, QR코드 생성기 등 순수 HTML/CSS/JS로 만든 미니 앱 모음.">

<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Mini Apps — 작고 재미있는 앱들의 세계">
<meta name="twitter:description" content="MBTI 테스트, 테트리스, 포모도로 타이머, 카드 게임, 네온사인 메이커, QR코드 생성기 등 순수 HTML/CSS/JS로 만든 미니 앱 모음.">
<meta name="twitter:image" content="https://chs2147.github.io/mini-apps/og-image.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #0d0d1a;
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --text-sub: rgba(240,240,245,0.55);
  }

  html, body {
    min-height: 100vh;
    font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  body {
    background-color: var(--c1);
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(123,47,255,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 10%, rgba(0,198,255,0.25) 0%, transparent 55%),
      radial-gradient(ellipse 60% 80% at 75% 80%, rgba(0,255,198,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 90% 60% at 10% 85%, rgba(100,60,220,0.2) 0%, transparent 55%);
    animation: meshShift 12s ease-in-out infinite alternate;
  }

  @keyframes meshShift {
    0%   { background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%; }
    25%  { background-position: 10% 15%, 90% 5%, 85% 90%, 5% 80%; }
    50%  { background-position: 5% 30%, 95% 20%, 80% 85%, 15% 70%; }
    75%  { background-position: 15% 10%, 85% 15%, 90% 80%, 10% 90%; }
    100% { background-position: 0% 20%, 100% 10%, 100% 90%, 0% 80%; }
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 48px;
    gap: 46px;
  }

  header { text-align: center; margin-bottom: 4px; }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-sub);
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    background: linear-gradient(135deg, #ffffff 0%, #a78bfa 40%, #38bdf8 70%, #34d399 100%);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradShift 6s ease-in-out infinite alternate;
  }

  @keyframes gradShift {
    0%   { background-position: 0% 0%; }
    100% { background-position: 100% 100%; }
  }

  .subtitle {
    margin-top: 14px;
    font-size: 1rem;
    color: var(--text-sub);
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  #sections-root {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 46px;
  }

  /* ── Section ── */
  .app-section {
    width: 100%;
    max-width: 1120px;
    min-width: 0;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    padding: 0 4px;
  }
  .section-header h2 {
    font-size: 1.2rem;
    font-weight: 750;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header .count {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-sub);
  }
  .section-monogram {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    flex-shrink: 0;
  }
  .see-more {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-sub);
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .see-more:hover { color: var(--text); }

  /* ── Slider ── */
  .slider-wrap { position: relative; }

  .slider-track {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    scroll-snap-type: x proximity;
    scroll-behavior: smooth;
    padding: 6px 4px 16px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .slider-track::-webkit-scrollbar { display: none; }

  .slider-arrow {
    position: absolute;
    top: 46%;
    transform: translateY(-50%);
    z-index: 3;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(10,10,20,0.75);
    border: 1px solid var(--glass-border);
    color: var(--text);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    font-size: 1rem;
    transition: background 0.2s;
  }
  .slider-arrow.visible { display: flex; }
  .slider-arrow:hover { background: rgba(255,255,255,0.14); }
  .slider-arrow.prev { left: -14px; }
  .slider-arrow.next { right: -14px; }

  /* ── Mini card ── */
  .mini-card {
    position: relative;
    flex: 0 0 auto;
    width: 224px;
    scroll-snap-align: start;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 22px 20px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.25s ease;

    opacity: 0;
    animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .mini-card:hover {
    transform: translateY(-5px);
    border-color: rgba(255,255,255,0.22);
    box-shadow: 0 16px 40px rgba(0,0,0,0.42), 0 0 34px var(--glow, rgba(123,47,255,0.25));
  }

  .mini-card .icon { font-size: 2rem; line-height: 1; }
  .mini-card .title { font-size: 1.02rem; font-weight: 700; letter-spacing: -0.01em; }
  .mini-card .desc {
    font-size: 0.78rem;
    color: var(--text-sub);
    line-height: 1.5;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .author-badge {
    align-self: flex-start;
    font-size: 0.66rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 8px;
    background: rgba(255,204,0,0.14);
    border: 1px solid rgba(255,204,0,0.35);
    color: #ffd43b;
    white-space: nowrap;
  }
  .device-badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .device-badge {
    font-size: 0.6rem;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 8px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text-sub);
    white-space: nowrap;
  }

  .mini-card .arrow {
    align-self: flex-end;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    transition: background 0.2s, transform 0.2s;
  }
  .mini-card:hover .arrow { background: rgba(255,255,255,0.16); transform: translateX(2px); }

  .mini-card .badge {
    position: absolute;
    top: 14px; right: 14px;
    font-size: 0.58rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 10px;
  }
  .badge.new { background: rgba(52,211,153,0.18); color: #6ee7b7; }
  .badge.updated { background: rgba(56,189,248,0.18); color: #7dd3fc; }

  /* accent glows per card color */
  .mini-card[data-color="purple"] { --glow: rgba(123,47,255,0.3); }
  .mini-card[data-color="blue"]   { --glow: rgba(0,198,255,0.3); }
  .mini-card[data-color="mint"]   { --glow: rgba(0,255,198,0.3); }
  .mini-card[data-color="gold"]   { --glow: rgba(201,162,39,0.3); }
  .mini-card[data-color="pink"]   { --glow: rgba(255,46,154,0.3); }
  .mini-card[data-color="cyan"]   { --glow: rgba(45,226,255,0.3); }
  .mini-card[data-color="orange"] { --glow: rgba(255,140,0,0.3); }
  .mini-card[data-color="amber"]  { --glow: rgba(201,162,39,0.3); }
  .mini-card[data-color="rose"]   { --glow: rgba(255,99,132,0.3); }
  .mini-card[data-color="indigo"] { --glow: rgba(99,102,241,0.3); }
  .mini-card[data-color="teal"]   { --glow: rgba(20,184,166,0.3); }

  footer {
    font-size: 0.78rem;
    color: var(--text-sub);
    opacity: 0.5;
    letter-spacing: 0.04em;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <p class="eyebrow">Mini Apps Collection</p>
    <h1>작고 재미있는<br>앱들의 세계</h1>
    <p class="subtitle">취향대로 골라 즐기는 미니 앱 모음</p>
  </header>

  <div id="sections-root"></div>

  <footer>Made with pure HTML · CSS · JS</footer>
</div>

<script src="apps-data.js?v=6"></script>
<script>
function fmtDesc(text, limit) {
  return text.length > limit ? text.slice(0, limit - 1) + '…' : text;
}

function renderCard(app, badge) {
  const badgeHtml = badge ? `<span class="badge ${badge.cls}">${badge.label}</span>` : '';
  return `
    <a class="mini-card" href="${app.href}" data-color="${app.color}" ${cardLinkAttrs(app)}>
      ${badgeHtml}
      <div class="icon">${app.icon}</div>
      <div class="title">${app.title}</div>
      <div class="desc">${fmtDesc(app.desc, 60)}</div>
      ${authorBadgeHtml(app)}
      <div class="device-badges">${deviceBadgesHtml(app)}</div>
      <div class="arrow">→</div>
    </a>`;
}

function renderSection({ key, title, apps, seeMoreHref, badgeFor }) {
  if (!apps.length) return '';
  const cardsHtml = apps.map(app => renderCard(app, badgeFor ? badgeFor(app) : null)).join('');
  const seeMore = seeMoreHref ? `<a class="see-more" href="${seeMoreHref}">더보기 →</a>` : '';
  return `
    <section class="app-section" data-section="${key}">
      <div class="section-header">
        <h2>${monogramHtml(key)} ${title} <span class="count">${apps.length}</span></h2>
        ${seeMore}
      </div>
      <div class="slider-wrap">
        <button class="slider-arrow prev" aria-label="이전" data-target="${key}">‹</button>
        <div class="slider-track" id="track-${key}">${cardsHtml}</div>
        <button class="slider-arrow next" aria-label="다음" data-target="${key}">›</button>
      </div>
    </section>`;
}

const featured = [...APPS].sort((a, b) => new Date(b.released) - new Date(a.released)).slice(0, 4);
const updated = APPS.filter(a => a.updated)
  .sort((a, b) => new Date(b.updated) - new Date(a.updated))
  .slice(0, 4);

const sections = [
  { key: 'featured', title: 'Featured', apps: featured, seeMoreHref: null, badgeFor: () => ({ cls: 'new', label: 'NEW' }) },
  { key: 'updated', title: 'Updated', apps: updated, seeMoreHref: null, badgeFor: () => ({ cls: 'updated', label: 'UPDATED' }) },
];

CATEGORY_ORDER.forEach(cat => {
  const meta = CATEGORY_META[cat];
  const catApps = APPS.filter(a => a.category === cat).sort((a, b) => new Date(a.released) - new Date(b.released));
  sections.push({
    key: cat,
    title: meta.label,
    apps: catApps.slice(0, 4),
    seeMoreHref: catApps.length > 4 ? `category.html?cat=${cat}` : null,
    badgeFor: null,
  });
});

document.getElementById('sections-root').innerHTML = sections.map(renderSection).join('');

document.querySelectorAll('.slider-arrow').forEach(btn => {
  btn.addEventListener('click', () => {
    const track = document.getElementById(`track-${btn.dataset.target}`);
    const dir = btn.classList.contains('prev') ? -1 : 1;
    track.scrollBy({ left: dir * (track.clientWidth * 0.8), behavior: 'smooth' });
  });
});

function updateArrowVisibility() {
  sections.forEach(({ key }) => {
    const track = document.getElementById(`track-${key}`);
    if (!track) return;
    const overflowing = track.scrollWidth > track.clientWidth + 4;
    track.parentElement.querySelectorAll('.slider-arrow').forEach(btn => {
      btn.classList.toggle('visible', overflowing);
    });
  });
}
updateArrowVisibility();
window.addEventListener('resize', () => {
  clearTimeout(window.__arrowResizeTimer);
  window.__arrowResizeTimer = setTimeout(updateArrowVisibility, 120);
});
</script>
</body>
</html>
