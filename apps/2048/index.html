<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --text-sub: rgba(240,240,245,0.55);
    --accent: #ff8c00;
  }

  html, body {
    width: 100%; height: 100%;
    font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
    color: var(--text);
    background-color: #0a0a12;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 15%, rgba(123,47,255,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 85% 85%, rgba(255,140,0,0.16) 0%, transparent 55%);
    overflow: hidden;
  }

  .back {
    position: fixed;
    top: 16px; left: 16px;
    z-index: 30;
    display: flex; align-items: center; gap: 6px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-sub);
    text-decoration: none;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    padding: 7px 13px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    transition: color 0.2s, background 0.2s;
  }
  .back:hover { color: var(--text); background: rgba(255,255,255,0.1); }

  .page {
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 54px 12px 12px;
  }

  h1 {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    flex-shrink: 0;
  }

  .stats-bar {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .stat-box {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 8px 18px;
    backdrop-filter: blur(16px);
    text-align: center;
    min-width: 80px;
  }
  .stat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-sub); }
  .stat-value { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; }

  .new-game-btn {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 9px 16px;
    color: var(--text);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .new-game-btn:hover { background: rgba(255,255,255,0.14); }

  /* ── Board ── */
  .board-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  #board {
    position: relative;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
  }

  .cell-bg {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
  }

  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-weight: 800;
    color: #1a1206;
    transition: transform 0.12s ease-out;
    user-select: none;
  }

  .tile-new { animation: tilePop 0.18s ease-out; }
  @keyframes tilePop { from { transform: scale(0.4); } to { transform: scale(1); } }

  .tile-merged { animation: tileMerge 0.18s ease-out; }
  @keyframes tileMerge { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

  .controls-hint {
    font-size: 0.68rem;
    color: var(--text-sub);
    text-align: center;
    flex-shrink: 0;
  }

  /* ── Overlays ── */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(3,3,8,0.82);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    backdrop-filter: blur(6px);
    padding: 20px;
    text-align: center;
  }
  .overlay.show { display: flex; }
  .overlay-title { font-size: clamp(1.1rem, 4vw, 1.6rem); font-weight: 800; }
  .overlay-sub { color: var(--text-sub); font-size: 0.9rem; }

  .modal-box {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 26px;
    backdrop-filter: blur(24px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 300px;
    width: 100%;
  }

  .btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
  }
  .btn:hover { background: rgba(255,255,255,0.16); }
  .btn.primary { background: linear-gradient(135deg, var(--accent), #ffcc66); color: #1a1206; border: none; }
  .btn.primary:hover { opacity: 0.9; }
</style>
</head>
<body>
<a class="back" href="../../index.html">← 홈으로</a>

<div class="page">
  <h1>🔢 2048</h1>

  <div class="stats-bar">
    <div class="stat-box">
      <div class="stat-label">점수</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">최고점수</div>
      <div class="stat-value" id="best">0</div>
    </div>
    <button class="new-game-btn" onclick="newGame()">새 게임</button>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
  </div>

  <div class="controls-hint">방향키 또는 스와이프로 타일을 이동하세요 · 같은 숫자끼리 만나면 합쳐집니다</div>
</div>

<div class="overlay" id="overlay-win">
  <div class="modal-box">
    <div class="overlay-title">🎉 2048 달성!</div>
    <div class="overlay-sub">계속 진행하며 더 높은 점수에 도전해보세요.</div>
    <button class="btn primary" onclick="continueGame()">계속하기</button>
    <button class="btn" onclick="newGame()">새 게임</button>
  </div>
</div>

<div class="overlay" id="overlay-over">
  <div class="modal-box">
    <div class="overlay-title">게임 오버</div>
    <div class="overlay-sub" id="final-score"></div>
    <button class="btn primary" onclick="newGame()">새 게임</button>
  </div>
</div>

<script>
const SIZE = 4;
const TILE_COLORS = {
  2:    { bg: 'linear-gradient(160deg, #cbb9ff, #a78bfa)', text: '#2a1a4a' },
  4:    { bg: 'linear-gradient(160deg, #a78bfa, #8b5cf6)', text: '#fff' },
  8:    { bg: 'linear-gradient(160deg, #60a5fa, #3b82f6)', text: '#fff' },
  16:   { bg: 'linear-gradient(160deg, #38bdf8, #0ea5e9)', text: '#fff' },
  32:   { bg: 'linear-gradient(160deg, #2de2ff, #06b6d4)', text: '#052029' },
  64:   { bg: 'linear-gradient(160deg, #34d399, #10b981)', text: '#052a1c' },
  128:  { bg: 'linear-gradient(160deg, #facc15, #eab308)', text: '#3a2c02', glow: 'rgba(250,204,21,0.5)' },
  256:  { bg: 'linear-gradient(160deg, #fb923c, #f97316)', text: '#3a1c02', glow: 'rgba(251,146,60,0.5)' },
  512:  { bg: 'linear-gradient(160deg, #ff8c00, #e65c00)', text: '#fff', glow: 'rgba(255,140,0,0.55)' },
  1024: { bg: 'linear-gradient(160deg, #ff2e9a, #d6006b)', text: '#fff', glow: 'rgba(255,46,154,0.6)' },
  2048: { bg: 'linear-gradient(160deg, #ffe93a, #ffd60a)', text: '#3a2c02', glow: 'rgba(255,233,58,0.75)' },
};
function tileStyle(value) {
  return TILE_COLORS[value] || { bg: 'linear-gradient(160deg, #fff, #eee)', text: '#111', glow: 'rgba(255,255,255,0.8)' };
}

let grid, score, best, won, gameOver, cellSize, gap;

function emptyGrid() { return Array.from({length: SIZE}, () => Array(SIZE).fill(0)); }

function newGame() {
  grid = emptyGrid();
  score = 0;
  won = false;
  gameOver = false;
  hideOverlay('overlay-win');
  hideOverlay('overlay-over');
  addRandomTile();
  addRandomTile();
  render();
}

function addRandomTile() {
  const empties = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empties.push([r, c]);
  if (empties.length === 0) return;
  const [r, c] = empties[Math.floor(Math.random() * empties.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  return [r, c];
}

/* ── Movement logic ── */
function slideLine(line) {
  const vals = line.filter(v => v !== 0);
  const merged = [];
  let gained = 0;
  for (let i = 0; i < vals.length; i++) {
    if (i < vals.length - 1 && vals[i] === vals[i + 1]) {
      const mergedVal = vals[i] * 2;
      merged.push(mergedVal);
      gained += mergedVal;
      if (mergedVal === 2048) won = true;
      i++;
    } else {
      merged.push(vals[i]);
    }
  }
  while (merged.length < SIZE) merged.push(0);
  return { line: merged, gained, moved: merged.some((v, i) => v !== line[i]) };
}

function move(dir) {
  if (gameOver) return;
  let moved = false;
  let totalGained = 0;

  if (dir === 'left' || dir === 'right') {
    for (let r = 0; r < SIZE; r++) {
      let line = grid[r].slice();
      if (dir === 'right') line.reverse();
      const res = slideLine(line);
      if (dir === 'right') res.line.reverse();
      if (res.moved) moved = true;
      totalGained += res.gained;
      grid[r] = res.line;
    }
  } else {
    for (let c = 0; c < SIZE; c++) {
      let line = [];
      for (let r = 0; r < SIZE; r++) line.push(grid[r][c]);
      if (dir === 'down') line.reverse();
      const res = slideLine(line);
      if (dir === 'down') res.line.reverse();
      if (res.moved) moved = true;
      totalGained += res.gained;
      for (let r = 0; r < SIZE; r++) grid[r][c] = res.line[r];
    }
  }

  if (!moved) return;

  score += totalGained;
  if (score > best) { best = score; localStorage.setItem('2048-best', String(best)); }

  addRandomTile();
  render();

  if (won && !document.getElementById('overlay-win').dataset.shown) {
    document.getElementById('overlay-win').dataset.shown = '1';
    showOverlay('overlay-win');
  } else if (!canMove()) {
    gameOver = true;
    document.getElementById('final-score').textContent = `최종 점수: ${score}`;
    showOverlay('overlay-over');
  }
}

function continueGame() {
  hideOverlay('overlay-win');
}

function canMove() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return true;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
      if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
    }
  return false;
}

/* ── Rendering ── */
function render() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;

  const board = document.getElementById('board');
  board.querySelectorAll('.tile').forEach(t => t.remove());

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const value = grid[r][c];
      if (value === 0) continue;
      const tile = document.createElement('div');
      tile.className = 'tile tile-new';
      const style = tileStyle(value);
      tile.style.background = style.bg;
      tile.style.color = style.text;
      if (style.glow) tile.style.boxShadow = `0 0 20px ${style.glow}`;
      tile.textContent = value;
      const fontSize = value >= 1024 ? cellSize * 0.32 : value >= 128 ? cellSize * 0.38 : cellSize * 0.44;
      tile.style.fontSize = fontSize + 'px';
      tile.style.width = cellSize + 'px';
      tile.style.height = cellSize + 'px';
      tile.style.left = (c * (cellSize + gap)) + 'px';
      tile.style.top = (r * (cellSize + gap)) + 'px';
      board.appendChild(tile);
    }
  }
}

function showOverlay(id) { document.getElementById(id).classList.add('show'); }
function hideOverlay(id) { document.getElementById(id).classList.remove('show'); }

/* ── Responsive layout ── */
function calcLayout() {
  const wrap = document.querySelector('.board-wrap');
  const vw = window.innerWidth, vh = window.innerHeight;
  const size = Math.min(wrap.clientWidth, wrap.clientHeight, vw * 0.94, vh * 0.6) - 20;
  gap = Math.max(6, size * 0.025);
  cellSize = (size - gap * (SIZE - 1)) / SIZE;

  const board = document.getElementById('board');
  const boardSize = cellSize * SIZE + gap * (SIZE - 1) + 20;
  board.style.width = boardSize + 'px';
  board.style.height = boardSize + 'px';
  board.style.gap = gap + 'px';

  board.querySelectorAll('.cell-bg').forEach(cb => {
    cb.style.width = cellSize + 'px';
    cb.style.height = cellSize + 'px';
  });

  if (grid) render();
}

function buildCellBackgrounds() {
  const board = document.getElementById('board');
  for (let i = 0; i < SIZE * SIZE; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell-bg';
    board.appendChild(cell);
  }
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(calcLayout, 80);
});

/* ── Input: keyboard ── */
document.addEventListener('keydown', e => {
  const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
  if (map[e.key]) {
    e.preventDefault();
    move(map[e.key]);
  }
});

/* ── Input: swipe ── */
let touchStartX, touchStartY;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    move(dx > 0 ? 'right' : 'left');
  } else {
    move(dy > 0 ? 'down' : 'up');
  }
}, { passive: true });

/* ── Init ── */
best = parseInt(localStorage.getItem('2048-best') || '0', 10);
buildCellBackgrounds();
calcLayout();
newGame();
</script>
</body>
</html>
